<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src https://tigerweb.geo.census.gov; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; base-uri 'none'; form-action 'none'; object-src 'none'; frame-ancestors 'none'" />
<title>Zip Code to KML Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #222632;
    --border: #2a2e3b;
    --text: #e4e5ea;
    --text-muted: #b7bac6;
    --accent: #4f8ff7;
    --accent-dim: rgba(79, 143, 247, 0.12);
    --success: #34d399;
    --success-dim: rgba(52, 211, 153, 0.12);
    --warn: #fbbf24;
    --warn-dim: rgba(251, 191, 36, 0.12);
    --error: #f87171;
    --radius: 10px;
    --font: -system-ui, sans-serif;
    --mono: -system-monospace, monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    line-height: 1.5;
  }

    a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

    a:hover { color: #6da8ff; }

  a:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 2px;
  }


  .container {
    width: 100%;
    max-width: 640px;
  }

  .header {
    margin-bottom: 36px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  .header p {
    font-size: 14px;
    color: var(--text-muted);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    min-height: 160px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 14px;
    resize: vertical;
    transition: border-color 0.2s;
  }

  textarea:focus {
    border-color: var(--accent);
  }

  textarea::placeholder {
    color: #4a4d5a;
  }

  .zip-count {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    font-family: var(--mono);
  }

  .options-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 16px;
  }

  .option-group label {
    margin-bottom: 6px;
  }

  .color-input-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  input[type="color"] {
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    cursor: pointer;
    padding: 2px;
  }

  .color-hex {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-muted);
  }

  input[type="text"],
  input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus,
  input[type="number"]:focus {
    border-color: var(--accent);
  }

  textarea:focus-visible,
  input[type="text"]:focus-visible,
  input[type="number"]:focus-visible,
  input[type="color"]:focus-visible,
  .btn:focus-visible {
    outline: 3px solid #b9d4ff;
    outline-offset: 2px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px 24px;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover:not(:disabled) {
    background: #3d7de0;
    transform: translateY(-1px);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .progress-area {
    margin-top: 20px;
    display: none;
  }

  .progress-area.visible {
    display: block;
  }

  .progress-bar-track {
    width: 100%;
    height: 6px;
    background: var(--bg);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .progress-text {
    font-size: 13px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .input-help {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
  }

  .log-area {
    margin-top: 20px;
    display: none;
  }

  .log-area.visible {
    display: block;
  }

  .log {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    max-height: 200px;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.8;
  }

  .log .success { color: var(--success); }
  .log .warn { color: var(--warn); }
  .log .error { color: var(--error); }
  .log .info { color: var(--accent); }

  .result-area {
    margin-top: 20px;
    display: none;
  }

  .result-area.visible {
    display: block;
  }

  .result-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    border-radius: 8px;
    margin-bottom: 16px;
  }

  .result-banner.ok {
    background: var(--success-dim);
    border: 1px solid rgba(52, 211, 153, 0.25);
    color: var(--success);
  }

  .result-banner.partial {
    background: var(--warn-dim);
    border: 1px solid rgba(251, 191, 36, 0.25);
    color: var(--warn);
  }

  .result-banner.fail {
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.25);
    color: var(--error);
  }

  .result-banner svg {
    flex-shrink: 0;
  }

  .result-banner span {
    font-size: 14px;
    font-weight: 500;
  }

  .btn-download {
    background: var(--success);
    color: #0f1117;
  }

  .btn-download:hover {
    background: #2ec48a;
    transform: translateY(-1px);
  }

  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 12px;
    color: #9ea3b4;
  }
</style>
</head>
<body>

<main class="container">
  <div class="header">
    <h1>Zip Code to KML Generator</h1>
    <p>Paste zip codes, generate a KML file with boundary polygons from US Census data. Import into Google My Maps or any GIS tool.</p>
  </div>

  <form id="zipForm" novalidate>
  <div class="card">
    <label for="zipInput">Zip Codes</label>
    <textarea id="zipInput" aria-describedby="zipInputHelp zipCount" placeholder="Paste zip codes here, separated by commas, spaces, or new lines...

30004, 30005, 30009, 30024, 30040, 30041
30060, 30062, 30064, 30066, 30068
30075, 30076, 30077, 30097"></textarea>
    <div class="input-help" id="zipInputHelp">Up to 200 unique 5-digit ZIP codes.</div>
    <div class="zip-count" id="zipCount" aria-live="polite">0 zip codes</div>

    <div class="options-row">
      <div class="option-group">
        <label for="fillColor">Fill Color</label>
        <div class="color-input-wrap">
          <input type="color" id="fillColor" value="#4f8ff7" />
          <span class="color-hex" id="fillHex">#4f8ff7</span>
        </div>
      </div>
      <div class="option-group">
        <label for="areaName">Area Name</label>
        <input type="text" id="areaName" value="Service Area" placeholder="Service Area" />
      </div>
    </div>
  </div>

  <button class="btn btn-primary" id="generateBtn" type="submit">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Generate KML
  </button>

  <div class="progress-area" id="progressArea">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Generation progress"></div>
    </div>
    <div class="progress-text" id="progressText" role="status" aria-live="polite">Starting...</div>
  </div>

  <div class="log-area" id="logArea">
    <div class="log" id="log" role="log" aria-live="polite" aria-atomic="false"></div>
  </div>

  <div class="result-area" id="resultArea">
    <div class="result-banner" id="resultBanner" role="status" aria-live="polite" aria-atomic="true" tabindex="-1">
      <span id="resultText"></span>
    </div>
    <button class="btn btn-download" id="downloadBtn" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download KML File
    </button>
  </div>

  <div class="footer">
    <a href="index.html">Back to Instructions</a> | Boundary data from US Census Bureau TIGER/Line.
  </div>
  </form>
</main>

<script>
(function() {
  'use strict';

  const zipInput = document.getElementById('zipInput');
  const zipCount = document.getElementById('zipCount');
  const fillColor = document.getElementById('fillColor');
  const fillHex = document.getElementById('fillHex');
  const areaName = document.getElementById('areaName');
  const zipForm = document.getElementById('zipForm');
  const generateBtn = document.getElementById('generateBtn');
  const progressArea = document.getElementById('progressArea');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const logArea = document.getElementById('logArea');
  const log = document.getElementById('log');
  const resultArea = document.getElementById('resultArea');
  const resultBanner = document.getElementById('resultBanner');
  const resultText = document.getElementById('resultText');
  const downloadBtn = document.getElementById('downloadBtn');

  const MAX_ZIPS = 200;
  const REQUEST_TIMEOUT_MS = 12000;

  let kmlBlob = null;

  function parseZips(input) {
    return [...new Set(
      input
        .split(/[\s,;]+/)
        .map(s => s.trim())
        .filter(s => /^\d{5}$/.test(s))
    )];
  }

  function updateZipCount() {
    const zips = parseZips(zipInput.value);
    zipCount.textContent = zips.length + ' zip code' + (zips.length !== 1 ? 's' : '');
    if (zips.length > MAX_ZIPS) {
      zipCount.textContent += ' (limit: ' + MAX_ZIPS + ')';
      zipInput.setAttribute('aria-invalid', 'true');
    } else {
      zipInput.removeAttribute('aria-invalid');
    }
  }

  zipInput.addEventListener('input', updateZipCount);

  fillColor.addEventListener('input', () => {
    fillHex.textContent = fillColor.value;
  });

  function addLog(msg, cls) {
    const line = document.createElement('div');
    if (cls) line.className = cls;
    line.textContent = msg;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  function setProgress(pct, text) {
    const safePct = Math.max(0, Math.min(100, pct));
    progressFill.style.width = safePct + '%';
    progressFill.setAttribute('aria-valuenow', String(safePct));
    if (text) progressText.textContent = text;
  }

  function setResult(kind, text) {
    resultArea.classList.add('visible');
    resultBanner.className = 'result-banner ' + kind;
    resultBanner.setAttribute('aria-live', kind === 'fail' ? 'assertive' : 'polite');
    resultText.textContent = text;
    if (kind === 'fail') resultBanner.focus();
  }

  function hexToKmlColor(hex, opacity) {
    // KML uses aabbggrr format.
    const r = hex.substring(1, 3);
    const g = hex.substring(3, 5);
    const b = hex.substring(5, 7);
    const a = Math.round(opacity * 255).toString(16).padStart(2, '0');
    return a + b + g + r;
  }

  async function fetchBatch(zips) {
    const whereClauses = zips.map(z => "ZCTA5='" + z + "'");
    const where = whereClauses.join(' OR ');

    const params = new URLSearchParams({
      where: where,
      outFields: 'ZCTA5,BASENAME',
      returnGeometry: 'true',
      outSR: '4326',
      f: 'geojson',
    });

    const url = 'https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/tigerWMS_Current/MapServer/2/query?' + params.toString();

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);
    let resp;
    try {
      resp = await fetch(url, { signal: controller.signal });
    } finally {
      clearTimeout(timeoutId);
    }
    if (!resp.ok) throw new Error('Census API returned ' + resp.status);
    const data = await resp.json();
    return data.features || [];
  }

  function coordsToKmlString(coords) {
    // coords is an array of [lng, lat] pairs.
    return coords.map(c => c[0] + ',' + c[1] + ',0').join(' ');
  }

  function geometryToKml(geometry, name, color) {
    let placemarks = '';

    if (geometry.type === 'Polygon') {
      placemarks += `<Placemark>
  <name>${escXml(name)}</name>
  <styleUrl>#serviceAreaStyle</styleUrl>
  <Polygon><outerBoundaryIs><LinearRing><coordinates>${coordsToKmlString(geometry.coordinates[0])}</coordinates></LinearRing></outerBoundaryIs>`;
      for (let i = 1; i < geometry.coordinates.length; i++) {
        placemarks += `<innerBoundaryIs><LinearRing><coordinates>${coordsToKmlString(geometry.coordinates[i])}</coordinates></LinearRing></innerBoundaryIs>`;
      }
      placemarks += `</Polygon></Placemark>`;
    } else if (geometry.type === 'MultiPolygon') {
      placemarks += `<Placemark><name>${escXml(name)}</name><styleUrl>#serviceAreaStyle</styleUrl><MultiGeometry>`;
      geometry.coordinates.forEach(polygon => {
        placemarks += '<Polygon>';
        polygon.forEach((ring, i) => {
          const tag = i === 0 ? 'outerBoundaryIs' : 'innerBoundaryIs';
          placemarks += '<' + tag + '><LinearRing><coordinates>' +
            coordsToKmlString(ring) +
            '</coordinates></LinearRing></' + tag + '>';
        });
        placemarks += '</Polygon>';
      });
      placemarks += '</MultiGeometry></Placemark>';
    }

    return placemarks;
  }

  function escXml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function buildKml(features, name, color) {
    const fillKml = hexToKmlColor(color, 0.4);
    const strokeKml = hexToKmlColor(color, 0.9);

    let placemarks = '';
    features.forEach(f => {
      const zip = f.properties.ZCTA5 || f.properties.BASENAME || '';
      placemarks += geometryToKml(f.geometry, zip, color);
    });

    return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
  <name>${escXml(name)}</name>
  <description>Service area boundaries generated from zip codes. Source: US Census Bureau TIGER/Line.</description>
  <Style id="serviceAreaStyle">
    <LineStyle>
      <color>${strokeKml}</color>
      <width>1.5</width>
    </LineStyle>
    <PolyStyle>
      <color>${fillKml}</color>
    </PolyStyle>
  </Style>
${placemarks}
</Document>
</kml>`;
  }

  async function generate() {
    const zips = parseZips(zipInput.value);
    if (zips.length === 0) {
      setResult('fail', 'Enter at least one valid 5-digit zip code.');
      downloadBtn.style.display = 'none';
      return;
    }

    if (zips.length > MAX_ZIPS) {
      setResult('fail', 'Too many zip codes. Limit is ' + MAX_ZIPS + ' unique codes.');
      downloadBtn.style.display = 'none';
      return;
    }

    generateBtn.disabled = true;
    progressArea.classList.add('visible');
    logArea.classList.add('visible');
    resultArea.classList.remove('visible');
    log.innerHTML = '';
    kmlBlob = null;

    addLog('Found ' + zips.length + ' unique zip codes.', 'info');

    const batchSize = 25;
    const batches = [];
    for (let i = 0; i < zips.length; i += batchSize) {
      batches.push(zips.slice(i, i + batchSize));
    }

    addLog('Fetching boundaries in ' + batches.length + ' batch(es) from Census TIGER/Line API...', 'info');

    let allFeatures = [];
    let foundZips = new Set();

    for (let i = 0; i < batches.length; i++) {
      const batch = batches[i];
      const pct = Math.round(((i) / batches.length) * 100);
      setProgress(pct, 'Batch ' + (i + 1) + ' of ' + batches.length + '...');
      addLog('Batch ' + (i + 1) + ': querying ' + batch.join(', '));

      try {
        const features = await fetchBatch(batch);
        features.forEach(f => {
          allFeatures.push(f);
          const z = f.properties.ZCTA5 || f.properties.BASENAME || '';
          if (z) foundZips.add(z);
        });
        addLog('  Returned ' + features.length + ' boundaries.', 'success');
      } catch (err) {
        if (err.name === 'AbortError') {
          addLog('  Error: request timed out after ' + (REQUEST_TIMEOUT_MS / 1000) + 's.', 'error');
        } else {
          addLog('  Error: ' + err.message, 'error');
        }
      }
    }

    setProgress(100, 'Done.');

    const missing = zips.filter(z => !foundZips.has(z));
    if (missing.length > 0) {
      addLog('Missing boundaries for: ' + missing.join(', '), 'warn');
    }

    addLog('Total boundaries found: ' + allFeatures.length + ' of ' + zips.length + ' zip codes.', 'info');

    if (allFeatures.length === 0) {
      setResult('fail', 'No boundaries found. Check your zip codes and try again.');
      downloadBtn.style.display = 'none';
      generateBtn.disabled = false;
      return;
    }

    // Build KML.
    addLog('Generating KML file...', 'info');
    const kmlString = buildKml(allFeatures, areaName.value || 'Service Area', fillColor.value);
    kmlBlob = new Blob([kmlString], { type: 'application/vnd.google-earth.kml+xml' });
    addLog('KML file ready. Size: ' + (kmlBlob.size / 1024).toFixed(1) + ' KB', 'success');

    resultArea.classList.add('visible');
    downloadBtn.style.display = '';

    if (missing.length === 0) {
      setResult('ok', 'All ' + allFeatures.length + ' zip code boundaries found.');
    } else {
      setResult('partial', allFeatures.length + ' of ' + zips.length + ' found. ' + missing.length + ' zip code(s) had no boundary data.');
    }

    generateBtn.disabled = false;
  }

  zipForm.addEventListener('submit', (e) => {
    e.preventDefault();
    generate();
  });

  downloadBtn.addEventListener('click', () => {
    if (!kmlBlob) return;
    const url = URL.createObjectURL(kmlBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (areaName.value || 'service-area').replace(/[^a-zA-Z0-9_-]/g, '_').toLowerCase() + '.kml';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
})();
</script>

</body>
</html>
